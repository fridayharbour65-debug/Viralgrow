<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viralgrow Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        header {
            background: #35424a;
            color: #ffffff;
            padding: 1em 0;
            text-align: center;
        }
        main {
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        form {
            display: flex;
            flex-direction: column;
        }
        input, textarea {
            margin-bottom: 10px;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            padding: 10px;
            font-size: 16px;
            color: #ffffff;
            background-color: #35424a;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #2c3e50;
        }
    </style>
</head>
<body>
    <header>
        <h1>Viralgrow Content Generator</h1>
    </header>
    <main>
        <h2>Generate and Preview Content</h2>
        <form id="contentForm">
            <input type="text" id="title" placeholder="Title" required>
            <textarea id="description" rows="4" placeholder="Description" required></textarea>
            <button type="submit">Generate Content</button>
        </form>
        <div id="preview" style="margin-top: 20px; padding: 10px; border: 1px solid #ccc;">
            <h3>Preview</h3>
            <h4 id="previewTitle"></h4>
            <p id="previewDescription"></p>
        </div>
    </main>
    <script>
        document.getElementById('contentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const title = document.getElementById('title').value;
            const description = document.getElementById('description').value;
            document.getElementById('previewTitle').innerText = title;
            document.getElementById('previewDescription').innerText = description;
        });
    </script>
</body>
</html>
